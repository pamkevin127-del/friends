<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>friends — stay connected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#475569',
                    },
                    fontFamily: {
                        display: ['Space Grotesk', 'system-ui', 'sans-serif'],
                        body: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', system-ui, sans-serif;
        }
        .font-display {
            font-family: 'Space Grotesk', system-ui, sans-serif;
        }
        .post-card {
            transition: all 0.2s ease;
        }
        .post-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }
        .btn-action {
            transition: all 0.15s ease;
        }
        .btn-action:hover {
            transform: scale(1.05);
        }
        .btn-action:active {
            transform: scale(0.95);
        }
        .avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .stagger-in {
            animation: staggerIn 0.5s ease forwards;
            opacity: 0;
        }
        @keyframes staggerIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .gradient-bg {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <h1 class="font-display text-2xl font-bold text-slate-900">friends</h1>
            <div class="flex items-center gap-4">
                <button class="text-slate-600 hover:text-primary transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                    </svg>
                </button>
                <div class="w-10 h-10 rounded-full avatar flex items-center justify-center text-white font-semibold cursor-pointer">
                    ME
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <!-- Create Post -->
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
            <div class="flex gap-4">
                <div class="w-12 h-12 rounded-full avatar flex items-center justify-center text-white font-semibold flex-shrink-0">
                    ME
                </div>
                <div class="flex-1">
                    <textarea 
                        id="postInput"
                        placeholder="What's on your mind?"
                        class="w-full resize-none border-0 outline-none text-slate-800 placeholder-slate-400 text-lg"
                        rows="2"
                    ></textarea>
                    <div class="flex items-center justify-between mt-4 pt-4 border-t border-slate-100">
                        <div class="flex gap-2">
                            <button class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-50 text-slate-600 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                </svg>
                                <span class="text-sm font-medium">Photo</span>
                            </button>
                        </div>
                        <button 
                            id="postBtn"
                            class="bg-primary text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition-colors btn-action disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            Post
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Feed -->
        <div id="feed" class="space-y-6">
            <!-- Posts will be inserted here -->
        </div>
    </main>

    <script>
        // Data
        const users = ['Alex', 'Jordan', 'Sam', 'Taylor', 'Casey'];
        const posts = [
            { id: 1, author: 'Alex', content: 'Just launched my new project! So excited to share it with everyone. Check it out and let me know what you think!', likes: 24, comments: 5, timestamp: '2h ago' },
            { id: 2, author: 'Jordan', content: 'Coffee and code make everything better ☕️', likes: 42, comments: 8, timestamp: '4h ago' },
            { id: 3, author: 'Sam', content: 'Beautiful sunset today. Sometimes you just need to step away from the screen and appreciate the world around you.', likes: 67, comments: 12, timestamp: '6h ago' },
            { id: 4, author: 'Taylor', content: 'Working on something exciting. Can\'t wait to share more details soon!', likes: 31, comments: 6, timestamp: '8h ago' },
        ];

        // State
        let postsData = [...posts];
        let nextId = 5;

        // Render posts
        function renderPosts() {
            const feed = document.getElementById('feed');
            feed.innerHTML = postsData.map((post, index) => `
                <article class="bg-white rounded-2xl shadow-sm p-6 post-card stagger-in" style="animation-delay: ${index * 0.1}s; transform: translateY(20px);">
                    <div class="flex items-start gap-4">
                        <div class="w-12 h-12 rounded-full avatar flex items-center justify-center text-white font-semibold flex-shrink-0">
                            ${post.author.substring(0, 2).toUpperCase()}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between mb-2">
                                <div>
                                    <h3 class="font-semibold text-slate-900">${post.author}</h3>
                                    <p class="text-sm text-slate-500">${post.timestamp}</p>
                                </div>
                                <button class="text-slate-400 hover:text-slate-600">
                                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                        <path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"></path>
                                    </svg>
                                </button>
                            </div>
                            <p class="text-slate-800 leading-relaxed mb-4">${post.content}</p>
                            <div class="flex items-center gap-6 pt-4 border-t border-slate-100">
                                <button 
                                    onclick="toggleLike(${post.id})"
                                    class="flex items-center gap-2 text-slate-600 hover:text-red-500 transition-colors btn-action group"
                                    data-post-id="${post.id}"
                                >
                                    <svg class="w-5 h-5 group-hover:fill-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                                    </svg>
                                    <span class="font-medium" id="like-count-${post.id}">${post.likes}</span>
                                </button>
                                <button class="flex items-center gap-2 text-slate-600 hover:text-primary transition-colors btn-action">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                                    </svg>
                                    <span class="font-medium">${post.comments}</span>
                                </button>
                                <button class="flex items-center gap-2 text-slate-600 hover:text-primary transition-colors btn-action ml-auto">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path>
                                    </svg>
                                    <span class="font-medium">Share</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        // Toggle like
        function toggleLike(postId) {
            const post = postsData.find(p => p.id === postId);
            if (post) {
                post.liked = !post.liked;
                post.likes += post.liked ? 1 : -1;
                const likeCount = document.getElementById(`like-count-${postId}`);
                if (likeCount) {
                    likeCount.textContent = post.likes;
                }
            }
        }

        // Create post
        document.getElementById('postBtn').addEventListener('click', () => {
            const input = document.getElementById('postInput');
            const content = input.value.trim();
            
            if (content) {
                const newPost = {
                    id: nextId++,
                    author: 'Me',
                    content: content,
                    likes: 0,
                    comments: 0,
                    timestamp: 'Just now'
                };
                
                postsData.unshift(newPost);
                input.value = '';
                renderPosts();
            }
        });

        // Allow Enter to post (Shift+Enter for new line)
        document.getElementById('postInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('postBtn').click();
            }
        });

        // Initial render
        renderPosts();
    </script>
</body>
</html>
